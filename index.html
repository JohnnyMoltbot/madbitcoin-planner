<html lang="fr">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>MadBitcoin Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,750&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {

      --metro:#1d4ed8; --metro-soft:#dbeafe; --danger:#dc2626; --danger-soft:#fee2e2;
      --nav-h:86px;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
    .app{max-width:430px;margin:0 auto;min-height:100dvh;padding:18px 14px calc(var(--nav-h) + 90px)}
    header{position:sticky;top:0;z-index:5;background:linear-gradient(var(--paper) 82%, transparent);padding:10px 0 14px}
    h1{font-family:Fraunces,serif;font-size:31px;line-height:.95;margin:0;letter-spacing:-.04em}
    .sub{font-size:12px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}
    .toolbar{display:flex;gap:8px;align-items:center;margin-top:14px}
    button{min-height:44px;border:1px solid var(--line);border-radius:999px;background:#fffaf4;color:var(--ink);font-weight:800;padding:0 14px;font-family:Inter,sans-serif}
    button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .stage{margin:18px 0 8px;display:flex;align-items:center;gap:8px;font-family:Fraunces,serif;font-size:22px}
    .dot{width:10px;height:10px;border-radius:50%} .dot.main{background:var(--main)} .dot.metro{background:var(--metro)}
    .card{width:100%;text-align:left;border:1px solid var(--line);background:#fffdf8;border-radius:18px;padding:13px 14px;margin:9px 0;box-shadow:0 1px 0 rgba(28,25,23,.04);min-height:74px}
    .card.selected{border-color:var(--btc);background:var(--btc-soft);box-shadow:0 0 0 2px rgba(249,115,22,.16)}
    .card.conflict{border-color:var(--danger);background:linear-gradient(90deg,var(--danger-soft),#fffdf8)}
    .meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:7px}
    .time{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--muted)}
    .badge{font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-radius:999px;padding:4px 7px;font-weight:900}
    .badge.main{background:var(--main-soft);color:var(--main)} .badge.metro{background:var(--metro-soft);color:var(--metro)}
    .title{font-family:Fraunces,serif;font-size:17px;line-height:1.05;letter-spacing:-.02em}
    .people{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.25}
    .hint{font-size:12px;color:var(--muted);margin:10px 0}

    .cal-event .time{font-size:9px;color:var(--muted);margin-bottom:2px}

    .cal-event.tiny .ct{-webkit-line-clamp:2;font-size:10.5px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(28,25,23,.42);z-index:30;display:none;align-items:flex-end;justify-content:center;padding:14px}
    .modal-backdrop.open{display:flex}

    .modal-close{width:44px;min-width:44px;height:44px;padding:0;border-radius:50%;font-size:22px;background:var(--paper)}
    .modal-row{border-top:1px solid var(--line);padding:12px 0;font-size:14px;line-height:1.35}
    .modal-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:900;margin-bottom:4px}

    .modal-warning.show{display:block}
    .modal-actions{position:sticky;bottom:-18px;background:linear-gradient(transparent,#fffdf8 22%);padding-top:18px;display:grid;grid-template-columns:1fr;gap:10px}
    .select-btn{width:100%;border-radius:16px;background:var(--btc);border-color:var(--btc);color:#431407;font-size:15px}
    .select-btn.selected{background:var(--ink);border-color:var(--ink);color:var(--paper)}
    .empty{border:1px dashed var(--line);border-radius:18px;padding:22px;text-align:center;color:var(--muted);margin-top:24px}
    nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100%);height:var(--nav-h);background:rgba(250,250,249,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr;padding:8px 10px max(8px,env(safe-area-inset-bottom));gap:8px;z-index:10}
    nav button{border-radius:16px;padding:0 8px;background:#fffdf8}
    nav button.active{background:var(--btc);border-color:var(--btc);color:#431407}
    .count{font-family:'JetBrains Mono';font-size:11px}
  </style>
</head>

<div class="app">
<header>
  <h1>MadBitcoin<br>Planner</h1>
  <div class="sub" id="subtitle">Lun 11 · programme</div>

<main id="view"></main>
</div>

    <div class="modal-actions"><button id="modalSelect" class="select-btn" onclick="toggleFromModal()"></button></div>
  </section>
</div>
<nav>

</nav>

const LS='madbitcoin:selected:v1';
let selected = new Set(JSON.parse(localStorage.getItem(LS)||'[]'));
let tab='monday', mode='list', modalEventId=null;
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const min=t=>{let [h,m]=t.split(':').map(Number);return h*60+m};
const overlap=(a,b)=>a.id!==b.id && a.day===b.day && min(a.start)<min(b.end) && min(b.start)<min(a.end);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function selectedEvents(){return EVENTS.filter(e=>selected.has(e.id)).sort((a,b)=>a.day.localeCompare(b.day)||min(a.start)-min(b.start));}
function conflictingSelected(e){return selectedEvents().filter(o=>overlap(e,o));}
function conflicts(e){return selected.has(e.id) && selectedEvents().some(o=>overlap(e,o));}
function persist(){localStorage.setItem(LS,JSON.stringify([...selected]));}
function toggle(id){selected.has(id)?selected.delete(id):selected.add(id);persist();render();}
function card(e){return `<button class="card ${selected.has(e.id)?'selected':''} ${conflicts(e)?'conflict':''}" onclick="openEvent('${e.id}')">
 <div class="meta"><span class="time">${e.start}–${e.end}</span><span class="badge ${e.stageKey}">${e.stage}</span></div>
 <div class="title">${esc(e.title)}</div>
 <div class="people">${esc(e.type)}${e.people.length?' · '+esc(e.people.slice(0,4).join(', ')):''}${e.people.length>4?'…':''}</div>
 </button>`}
function openEvent(id){
 const e=EVENTS.find(x=>x.id===id); if(!e) return; modalEventId=id;
 $('#modalKicker').textContent=`${e.dayLabel} · ${e.start}–${e.end}`;
 $('#modalTitle').textContent=e.title;
 $('#modalStage').textContent=e.stage;
 $('#modalType').textContent=e.type||'—';
 $('#modalPeople').textContent=e.people.length?e.people.join(', '):'—';
 $('#modalBlock').textContent=e.block||'—';
 const conflicts=conflictingSelected(e).filter(o=>o.id!==e.id);
 $('#modalWarning').classList.toggle('show',conflicts.length>0);
 $('#modalWarning').textContent=conflicts.length?`Conflit horaire avec : ${conflicts.map(x=>x.start+' '+x.title).join(' · ')}`:'';
 const btn=$('#modalSelect'); btn.classList.toggle('selected',selected.has(id)); btn.textContent=selected.has(id)?'Retirer de mon plan':'Ajouter à mon plan';
 $('#modalBackdrop').classList.add('open');
}
function closeModal(){modalEventId=null; $('#modalBackdrop').classList.remove('open');}
function backdropClose(ev){if(ev.target.id==='modalBackdrop') closeModal();}
function toggleFromModal(){if(!modalEventId)return; selected.has(modalEventId)?selected.delete(modalEventId):selected.add(modalEventId); persist(); openEvent(modalEventId); render();}

function listView(day, onlySelected=false){
 let ev=(onlySelected?selectedEvents():EVENTS.filter(e=>e.day===day)).sort((a,b)=>min(a.start)-min(b.start));
 if(!ev.length) return '<div class="empty">Aucun événement sélectionné pour l’instant.</div>';
 let stages=['Teatro Fernando de Rojas','Metrópolis Stage'];
 return stages.map(st=>{let group=ev.filter(e=>e.stage===st); if(!group.length)return ''; return `<div class="stage"><span class="dot ${group[0].stageKey}"></span>${st}</div>`+group.map(card).join('')}).join('');
}
function calendarView(day){
 const ev=EVENTS.filter(e=>e.day===day); const start=9*60, end=18*60, px=2.75, minH=46, gap=7;
 function layout(stageKey){
   let lastBottom=0;
   return ev.filter(e=>e.stageKey===stageKey).sort((a,b)=>min(a.start)-min(b.start)).map(e=>{
     const timeTop=(min(e.start)-start)*px;
     const h=Math.max(minH,(min(e.end)-min(e.start))*px-5);
     const top=Math.max(timeTop,lastBottom+gap);
     lastBottom=top+h;
     return {e,top,h};
   });
 }
 const mainLayout=layout('main'), metroLayout=layout('metro');
 const height=Math.max((end-start)*px, ...mainLayout.map(x=>x.top+x.h), ...metroLayout.map(x=>x.top+x.h)) + 24;
 let ticks='';
 for(let t=start;t<=end;t+=60){ticks+=`<div class="tick" style="top:${(t-start)*px}px">${String(Math.floor(t/60)).padStart(2,'0')}:00</div>`}
 $('#view').innerHTML=`<div class="cal-wrap">
   <div class="cal-legend"><div></div><div class="cal-stage-label main">Teatro</div><div class="cal-stage-label metro">Metrópolis</div></div>
   <div class="cal-body" style="height:${height}px">
     <div class="cal-axis">${ticks}</div>
     <div class="cal-col main" style="height:${height}px"></div>
     <div class="cal-col metro" style="height:${height}px"></div>
   </div>
 </div>`;
 [...mainLayout,...metroLayout].forEach(({e,top,h})=>{
   let col=document.querySelector('.cal-col.'+e.stageKey);
   let el=document.createElement('button');
   el.className=`cal-event ${e.stageKey} ${h<54?'tiny':''} ${selected.has(e.id)?'selected':''} ${conflicts(e)?'conflict':''}`;
   el.style.top=top+'px'; el.style.height=h+'px';
   el.onclick=()=>openEvent(e.id);
   el.innerHTML=`<div class="time">${e.start}–${e.end}</div><div class="ct">${esc(e.title)}</div>`;
   col.appendChild(el);
 });
 return null;
}
function render(){
 $('#subtitle').textContent = tab==='plan' ? 'Mon planning sélectionné' : (tab==='monday'?'Lun 11':'Mar 12')+' · programme';
 $('#toolbar').style.display = tab==='plan'?'none':'flex';
 $$('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 $$('#toolbar button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
 $('#c-monday').textContent=[...selected].filter(id=>EVENTS.find(e=>e.id===id)?.day==='monday').length;
 $('#c-tuesday').textContent=[...selected].filter(id=>EVENTS.find(e=>e.id===id)?.day==='tuesday').length;
 $('#c-plan').textContent=selected.size;
 if(tab==='plan') $('#view').innerHTML=listView(null,true);
 else if(mode==='list') $('#view').innerHTML=listView(tab,false);
 else calendarView(tab);
}
$$('nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
$$('#toolbar button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();
</script>
