const LS='madbitcoin:selected:v1';
let selected = new Set(JSON.parse(localStorage.getItem(LS)||'[]'));
let tab='monday', mode='list';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const min=t=>{let [h,m]=t.split(':').map(Number);return h*60+m};
const overlap=(a,b)=>a.id!==b.id && a.day===b.day && min(a.start)<min(b.end) && min(b.start)<min(a.end);
function selectedEvents(){return EVENTS.filter(e=>selected.has(e.id)).sort((a,b)=>a.day.localeCompare(b.day)||min(a.start)-min(b.start));}
function conflicts(e){return selected.has(e.id) && selectedEvents().some(o=>overlap(e,o));}
function toggle(id){selected.has(id)?selected.delete(id):selected.add(id);localStorage.setItem(LS,JSON.stringify([...selected]));render();}
function card(e){return `<button class="card ${selected.has(e.id)?'selected':''} ${conflicts(e)?'conflict':''}" onclick="toggle('${e.id}')">
 <div class="meta"><span class="time">${e.start}–${e.end}</span><span class="badge ${e.stageKey}">${e.stage}</span></div>
 <div class="title">${e.title}</div>
 <div class="people">${e.type}${e.people.length?' · '+e.people.slice(0,4).join(', '):''}${e.people.length>4?'…':''}</div>
 </button>`}
function listView(day, onlySelected=false){
 let ev=(onlySelected?selectedEvents():EVENTS.filter(e=>e.day===day)).sort((a,b)=>min(a.start)-min(b.start));
 if(!ev.length) return '<div class="empty">Aucun événement sélectionné pour l’instant.</div>';
 let stages=['Teatro Fernando de Rojas','Metrópolis Stage'];
 return stages.map(st=>{let group=ev.filter(e=>e.stage===st); if(!group.length)return ''; return `<div class="stage"><span class="dot ${group[0].stageKey}"></span>${st}</div>`+group.map(card).join('')}).join('');
}
function calendarView(day){
 const ev=EVENTS.filter(e=>e.day===day); const start=9*60, end=18*60, px=58/30;
 let html='<div class="calendar"><div></div><div class="cal-head">Teatro</div><div class="cal-head">Metrópolis</div>';
 for(let t=start;t<=end;t+=30){let label=t%60===0?String(t/60).padStart(2,'0')+':00':''; html+=`<div class="axis">${label}</div><div class="slot"></div><div class="slot"></div>`}
 html+='</div><div style="position:relative;margin-top:-'+((end-start)/30+1)*58+'px;height:'+((end-start)/30+1)*58+'px;display:grid;grid-template-columns:34px 1fr 1fr;gap:6px;pointer-events:none"><div></div><div class="col main"></div><div class="col metro"></div></div>';
 $('#view').innerHTML=html;
 ev.forEach(e=>{let col=document.querySelector('.col.'+e.stageKey); let el=document.createElement('button'); el.className='cal-event '+(selected.has(e.id)?'selected ':'')+(conflicts(e)?'conflict':''); el.style.top=((min(e.start)-start)*px)+'px'; el.style.height=Math.max(34,(min(e.end)-min(e.start))*px-3)+'px'; el.style.pointerEvents='auto'; el.onclick=()=>toggle(e.id); el.innerHTML=`<div class="time">${e.start}</div><div class="ct">${e.title}</div>`; col.appendChild(el); });
 return null;
}
function render(){
 $('#subtitle').textContent = tab==='plan' ? 'Mon planning sélectionné' : (tab==='monday'?'Lun 11':'Mar 12')+' · programme';
 $('#toolbar').style.display = tab==='plan'?'none':'flex';
 $$('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
 $$('#toolbar button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
 $('#c-monday').textContent=[...selected].filter(id=>EVENTS.find(e=>e.id===id)?.day==='monday').length;
 $('#c-tuesday').textContent=[...selected].filter(id=>EVENTS.find(e=>e.id===id)?.day==='tuesday').length;
 $('#c-plan').textContent=selected.size;
 if(tab==='plan') $('#view').innerHTML=listView(null,true);
 else if(mode==='list') $('#view').innerHTML=listView(tab,false);
 else calendarView(tab);
}
$$('nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
$$('#toolbar button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render();});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();
</script>
